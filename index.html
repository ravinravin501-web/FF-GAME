<!DOCTYPE html>
<html>
<head>
  <title>Battle Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="lobby">
  <h1>Ravin Battle Game</h1>
  <p>Mobile Web Shooting Game</p>
  <button onclick="startGame()">START GAME</button>
</div>

<div id="gameArea">
  <div id="healthBox">
    Health: <span id="health">100</span>
  </div>

  <div id="inventory">
    Gun: <span id="gunName">Pistol</span> |
    Ammo: <span id="ammo">30</span>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="controls">
    <button ontouchstart="moveUp=true" ontouchend="moveUp=false">▲</button>
    <div>
      <button ontouchstart="moveLeft=true" ontouchend="moveLeft=false">◀</button>
      <button ontouchstart="moveDown=true" ontouchend="moveDown=false">▼</button>
      <button ontouchstart="moveRight=true" ontouchend="moveRight=false">▶</button>
    </div>
    <button onclick="shoot()">🔥</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
