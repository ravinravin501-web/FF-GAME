<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Fire Max</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="startScreen">
  <h1>🔥 BATTLE FIRE MAX 🔥</h1>
  <p>Survival Shooting Web Game</p>
  <button onclick="startGame()">START GAME</button>

  <div class="controls">
    <p>Move: WASD / Arrow Keys</p>
    <p>Shoot: Mouse Click / Tap</p>
    <p>Guns: 1 Pistol | 2 SMG | 3 Shotgun | 4 Sniper</p>
    <p>Reload: R</p>
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<script src="game.js"></script>
</body>
</html>
