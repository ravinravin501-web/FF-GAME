<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>3D Battle Royale</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{overflow:hidden;background:#000}
canvas{display:block}

#lobby{
position:fixed;inset:0;z-index:10;
background:linear-gradient(135deg,#050505,#111,#2b2100);
color:white;text-align:center;padding-top:45px;
}
#lobby h1{font-size:36px;color:#ffd000;text-shadow:0 0 20px #ffd000}
#lobby p{margin-top:10px;color:#ddd}
#start{
margin-top:360px;width:270px;height:65px;border:none;border-radius:40px;
background:#ffd000;font-size:24px;font-weight:bold;
box-shadow:0 0 30px #ffd000;
}

#jumpBtn{
display:none;position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
z-index:20;width:200px;height:60px;border:none;border-radius:35px;
background:#ffd000;font-size:22px;font-weight:bold;
box-shadow:0 0 25px #ffd000;
}

#hud{display:none;position:fixed;inset:0;z-index:15;pointer-events:none}

#healthBox{
position:absolute;top:18px;left:18px;width:180px;height:22px;
border:2px solid white;border-radius:20px;background:#222;
}
#health{width:100%;height:100%;background:#00ff44;border-radius:20px}

#info{
position:absolute;top:50px;left:18px;color:white;background:rgba(0,0,0,.55);
padding:10px;border-radius:12px;font-size:14px;
}

#kills{
position:absolute;top:18px;right:18px;color:white;background:rgba(0,0,0,.55);
padding:12px;border-radius:15px;font-size:16px;
}

.controls{
position:absolute;bottom:25px;left:18px;
display:grid;grid-template-columns:70px 70px 70px;gap:10px;
pointer-events:auto;
}
.btn{
width:70px;height:70px;border:none;border-radius:22px;
background:rgba(255,255,255,.18);color:white;font-size:28px;font-weight:bold;
backdrop-filter:blur(8px);
}
.up{grid-column:2}
.left{grid-column:1}
.down{grid-column:2}
.right{grid-column:3}

#fire{
position:absolute;bottom:45px;right:25px;width:90px;height:90px;border:none;
border-radius:50%;background:#ff2a2a;color:white;font-size:34px;
box-shadow:0 0 25px red;pointer-events:auto;
}

#message{
display:none;position:fixed;inset:0;z-index:30;background:rgba(0,0,0,.85);
color:white;text-align:center;padding-top:230px;
}
#message h1{font-size:45px;color:#ffd000}
#message button{
margin-top:25px;padding:15px 40px;border:none;border-radius:30px;
background:#ffd000;font-size:20px;font-weight:bold;
}
</style>
</head>

<body>

<div id="lobby">
<h1>BATTLE ROYALE 3D</h1>
<p>Lobby • Airplane • Parachute • Bots • Shooting</p>
<button id="start">START MATCH</button>
</div>

<button id="jumpBtn">JUMP</button>

<div id="hud">
<div id="healthBox"><div id="health"></div></div>
<div id="info">🔫 Gun: Rifle<br>🎒 Bag: Level 1<br>❤️ Medkit: 1</div>
<div id="kills">Kills: 0</div>

<div class="controls">
<button class="btn up" ontouchstart="moveForward=true" ontouchend="moveForward=false">▲</button>
<button class="btn left" ontouchstart="moveLeft=true" ontouchend="moveLeft=false">◀</button>
<button class="btn down" ontouchstart="moveBack=true" ontouchend="moveBack=false">▼</button>
<button class="btn right" ontouchstart="moveRight=true" ontouchend="moveRight=false">▶</button>
</div>

<button id="fire">🔥</button>
</div>

<div id="message">
<h1 id="msgTitle">BOOYAH!</h1>
<p id="msgText"></p>
<button onclick="location.reload()">PLAY AGAIN</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene,camera,renderer;
let player,plane,parachute,gun;
let enemies=[],bullets=[];
let gameState="lobby";
let health=100,kills=0;
let moveForward=false,moveBack=false,moveLeft=false,moveRight=false;

init();
animate();

function init(){
scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,1000);
camera.position.set(0,6,10);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff,.6));

createMap();
createPlayer();
createLobbyCharacter();
createPlane();

window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

document.getElementById("start").onclick=startMatch;
document.getElementById("jumpBtn").onclick=jump;
document.getElementById("fire").onclick=shoot;
}

function createMap(){
let ground=new THREE.Mesh(
new THREE.CircleGeometry(60,64),
new THREE.MeshStandardMaterial({color:0x228b22})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

let water=new THREE.Mesh(
new THREE.CircleGeometry(90,64),
new THREE.MeshStandardMaterial({color:0x0077ff})
);
water.rotation.x=-Math.PI/2;
water.position.y=-.05;
scene.add(water);

for(let i=0;i<35;i++){
let tree=new THREE.Group();
let trunk=new THREE.Mesh(new THREE.CylinderGeometry(.15,.2,1),new THREE.MeshStandardMaterial({color:0x6b3f1d}));
let leaves=new THREE.Mesh(new THREE.ConeGeometry(.8,2,8),new THREE.MeshStandardMaterial({color:0x064d14}));
leaves.position.y=1.5;
tree.add(trunk,leaves);
tree.position.set((Math.random()-.5)*90,0,(Math.random()-.5)*90);
scene.add(tree);
}

for(let i=0;i<8;i++){
let house=new THREE.Group();
let base=new THREE.Mesh(new THREE.BoxGeometry(3,2,3),new THREE.MeshStandardMaterial({color:0xc27a2c}));
base.position.y=1;
let roof=new THREE.Mesh(new THREE.ConeGeometry(2.5,1.5,4),new THREE.MeshStandardMaterial({color:0x8b0000}));
roof.position.y=2.7;
roof.rotation.y=Math.PI/4;
house.add(base,roof);
house.position.set((Math.random()-.5)*50,0,(Math.random()-.5)*50);
scene.add(house);
}

let zone=new THREE.Mesh(
new THREE.TorusGeometry(22,.12,16,100),
new THREE.MeshBasicMaterial({color:0x00ffff})
);
zone.rotation.x=Math.PI/2;
scene.add(zone);
}

function makeBoy(color){
let g=new THREE.Group();

let head=new THREE.Mesh(new THREE.SphereGeometry(.45,24,24),new THREE.MeshStandardMaterial({color:0xffc08a}));
head.position.y=2.5;

let body=new THREE.Mesh(new THREE.BoxGeometry(.9,1.2,.45),new THREE.MeshStandardMaterial({color}));
body.position.y=1.65;

let leg1=new THREE.Mesh(new THREE.BoxGeometry(.32,.9,.32),new THREE.MeshStandardMaterial({color:0x111111}));
leg1.position.set(-.25,.65,0);

let leg2=leg1.clone();
leg2.position.x=.25;

let arm1=new THREE.Mesh(new THREE.BoxGeometry(.25,1,.25),new THREE.MeshStandardMaterial({color:0xffc08a}));
arm1.position.set(-.7,1.7,0);

let arm2=arm1.clone();
arm2.position.x=.7;

g.add(head,body,leg1,leg2,arm1,arm2);
return g;
}

function createPlayer(){
player=makeBoy(0x004cff);
player.position.set(0,0,0);
player.visible=false;

gun=new THREE.Mesh(new THREE.BoxGeometry(1,.18,.18),new THREE.MeshStandardMaterial({color:0x111111}));
gun.position.set(.9,1.7,.1);
player.add(gun);

scene.add(player);
}

function createLobbyCharacter(){
let lobbyChar=makeBoy(0xffd000);
lobbyChar.position.set(0,0,0);
lobbyChar.name="lobbyChar";
scene.add(lobbyChar);
camera.position.set(0,3.5,7);
camera.lookAt(0,1.5,0);
}

function createPlane(){
plane=new THREE.Group();

let body=new THREE.Mesh(new THREE.BoxGeometry(5,1,1),new THREE.MeshStandardMaterial({color:0xcccccc}));
let wing=new THREE.Mesh(new THREE.BoxGeometry(1,0.15,6),new THREE.MeshStandardMaterial({color:0x999999}));
let tail=new THREE.Mesh(new THREE.BoxGeometry(1,.15,2),new THREE.MeshStandardMaterial({color:0x777777}));
tail.position.set(-2.3,.7,0);

plane.add(body,wing,tail);
plane.position.set(-45,25,0);
plane.visible=false;
scene.add(plane);
}

function startMatch(){
document.getElementById("lobby").style.display="none";
scene.getObjectByName("lobbyChar").visible=false;
plane.visible=true;
gameState="plane";
document.getElementById("jumpBtn").style.display="block";
camera.position.set(0,28,20);
camera.lookAt(plane.position);
}

function jump(){
document.getElementById("jumpBtn").style.display="none";
plane.visible=false;
player.visible=true;
player.position.set(0,22,0);

parachute=new THREE.Mesh(
new THREE.SphereGeometry(2,32,16,0,Math.PI*2,0,Math.PI/2),
new THREE.MeshStandardMaterial({color:0xff0000})
);
parachute.position.set(0,25,0);
scene.add(parachute);

gameState="falling";
}

function land(){
gameState="playing";
scene.remove(parachute);
document.getElementById("hud").style.display="block";
spawnEnemies();
}

function spawnEnemies(){
for(let i=0;i<7;i++){
let e=makeBoy(0xff0000);
e.position.set((Math.random()-.5)*40,0,(Math.random()-.5)*40);
scene.add(e);
enemies.push(e);
}
}

function shoot(){
if(gameState!=="playing")return;

let b=new THREE.Mesh(
new THREE.SphereGeometry(.15,12,12),
new THREE.MeshBasicMaterial({color:0xffff00})
);
b.position.copy(player.position);
b.position.y=1.7;

let dir=new THREE.Vector3(0,0,-1);
dir.applyQuaternion(player.quaternion);

b.userData.dir=dir;
scene.add(b);
bullets.push(b);
}

function updateBullets(){
bullets.forEach((b,bi)=>{
b.position.add(b.userData.dir.clone().multiplyScalar(.8));

enemies.forEach((e,ei)=>{
if(b.position.distanceTo(e.position)<1.2){
scene.remove(e);
scene.remove(b);
enemies.splice(ei,1);
bullets.splice(bi,1);
kills++;
document.getElementById("kills").innerHTML="Kills: "+kills;
if(kills>=7)win();
}
});

if(b.position.length()>80){
scene.remove(b);
bullets.splice(bi,1);
}
});
}

function updatePlayer(){
let speed=.18;

if(moveForward)player.position.z-=speed;
if(moveBack)player.position.z+=speed;
if(moveLeft){player.position.x-=speed;player.rotation.y=.5}
if(moveRight){player.position.x+=speed;player.rotation.y=-.5}
if(moveForward)player.rotation.y=0;
if(moveBack)player.rotation.y=Math.PI;

camera.position.x=player.position.x;
camera.position.y=5;
camera.position.z=player.position.z+8;
camera.lookAt(player.position.x,1.5,player.position.z);
}

function updateEnemies(){
enemies.forEach(e=>{
let dir=new THREE.Vector3().subVectors(player.position,e.position);
let dist=dir.length();
dir.normalize();
e.position.add(dir.multiplyScalar(.045));
e.lookAt(player.position);

if(dist<1.4){
health-=.25;
document.getElementById("health").style.width=health+"%";
if(health<=0)lose();
}
});
}

function win(){
gameState="end";
document.getElementById("msgTitle").innerHTML="BOOYAH!";
document.getElementById("msgText").innerHTML="You defeated all enemy bots!";
document.getElementById("message").style.display="block";
}

function lose(){
gameState="end";
document.getElementById("msgTitle").innerHTML="GAME OVER";
document.getElementById("msgTitle").style.color="red";
document.getElementById("msgText").innerHTML="Kills: "+kills;
document.getElementById("message").style.display="block";
}

function animate(){
requestAnimationFrame(animate);

if(gameState==="lobby"){
let c=scene.getObjectByName("lobbyChar");
if(c)c.rotation.y+=.01;
}

if(gameState==="plane"){
plane.position.x+=.35;
camera.lookAt(plane.position);
if(plane.position.x>45)plane.position.x=-45;
}

if(gameState==="falling"){
player.position.y-=.12;
parachute.position.x=player.position.x;
parachute.position.z=player.position.z;
parachute.position.y=player.position.y+3;

camera.position.set(player.position.x,player.position.y+4,player.position.z+8);
camera.lookAt(player.position);

if(player.position.y<=0){
player.position.y=0;
land();
}
}

if(gameState==="playing"){
updatePlayer();
updateEnemies();
updateBullets();
}

renderer.render(scene,camera);
}
</script>

</body>
</html>
