<!DOCTYPE html>
<html>
<head>
<title>Ravin Battle Royale</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="lobby">
  <div class="hero">
    <h1>RAVIN BATTLE ROYALE</h1>
    <p>Survive • Fight • Win</p>
    <button onclick="startDrop()">START MATCH</button>
  </div>
</div>

<div id="dropScene">
  <div class="sky">
    <div class="plane">✈️</div>
    <div id="jumper">🪂</div>
    <h2 id="dropText">Flying over battle island...</h2>
  </div>
</div>

<div id="gameArea">
  <div id="topBar">
    <span>❤️ HP: <b id="health">100</b></span>
    <span>🔫 Gun: <b>Pistol</b></span>
    <span>🎒 Ammo: <b id="ammo">30</b></span>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="controls">
    <div class="move">
      <button ontouchstart="up=true" ontouchend="up=false">▲</button>
      <div>
        <button ontouchstart="left=true" ontouchend="left=false">◀</button>
        <button ontouchstart="down=true" ontouchend="down=false">▼</button>
        <button ontouchstart="right=true" ontouchend="right=false">▶</button>
      </div>
    </div>

    <button class="fire" onclick="shoot()">🔥</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
