<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Royale Web Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
    user-select:none;
}

body{
    overflow:hidden;
    background:#000;
}

/* GAME AREA */
#game{
    width:100vw;
    height:100vh;
    position:relative;
    background:linear-gradient(#4fc3ff,#8be37a 55%,#2d8a3a);
    overflow:hidden;
}

/* LOBBY */
#lobby{
    position:absolute;
    inset:0;
    background:
    linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.8)),
    url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1000&q=80");
    background-size:cover;
    background-position:center;
    z-index:20;
    color:white;
    text-align:center;
    padding:25px;
}

#lobby h1{
    margin-top:40px;
    font-size:34px;
    color:#ffd000;
    text-shadow:0 0 15px #000;
}

.character{
    width:120px;
    height:220px;
    margin:70px auto 30px;
    position:relative;
    animation:idle 1.5s infinite alternate;
}

.head{
    width:55px;
    height:55px;
    background:#ffcc99;
    border-radius:50%;
    margin:auto;
}

.body{
    width:75px;
    height:100px;
    background:#1e40ff;
    border-radius:18px;
    margin:auto;
}

.legs{
    display:flex;
    justify-content:center;
    gap:12px;
}

.leg{
    width:25px;
    height:70px;
    background:#111;
    border-radius:12px;
}

@keyframes idle{
    from{transform:translateY(0);}
    to{transform:translateY(-10px);}
}

.startBtn{
    width:260px;
    padding:18px;
    border:none;
    border-radius:40px;
    font-size:24px;
    font-weight:bold;
    background:#ffd000;
    box-shadow:0 0 25px #ffd000;
}

/* PLANE */
#planeScene{
    display:none;
    position:absolute;
    inset:0;
    z-index:15;
    background:linear-gradient(#68cfff,#dff7ff);
    overflow:hidden;
}

#plane{
    position:absolute;
    top:35%;
    left:-180px;
    font-size:100px;
    animation:fly 5s linear forwards;
}

@keyframes fly{
    to{left:110%;}
}

#jumpBtn{
    position:absolute;
    bottom:80px;
    left:50%;
    transform:translateX(-50%);
    padding:18px 45px;
    border:none;
    border-radius:35px;
    background:#ffcc00;
    font-size:22px;
    font-weight:bold;
}

/* PLAYER */
#player{
    position:absolute;
    width:42px;
    height:70px;
    left:50%;
    top:55%;
    transform:translate(-50%,-50%);
    z-index:5;
}

.pHead{
    width:28px;
    height:28px;
    background:#ffc28a;
    border-radius:50%;
    margin:auto;
}

.pBody{
    width:38px;
    height:38px;
    background:#194bff;
    border-radius:10px;
    margin:auto;
}

.pGun{
    position:absolute;
    right:-25px;
    top:35px;
    width:35px;
    height:8px;
    background:#111;
    border-radius:5px;
}

/* PARACHUTE */
#parachute{
    display:none;
    position:absolute;
    left:50%;
    top:15%;
    transform:translateX(-50%);
    font-size:70px;
    z-index:8;
}

/* HUD */
#hud{
    display:none;
    position:absolute;
    inset:0;
    z-index:10;
    pointer-events:none;
}

.healthBox{
    position:absolute;
    top:20px;
    left:20px;
    width:160px;
    height:20px;
    background:#333;
    border:2px solid white;
    border-radius:20px;
}

#health{
    width:100%;
    height:100%;
    background:#00ff44;
    border-radius:20px;
}

.inventory{
    position:absolute;
    top:55px;
    left:20px;
    color:white;
    font-size:16px;
    background:rgba(0,0,0,.5);
    padding:10px;
    border-radius:12px;
}

#score{
    position:absolute;
    top:20px;
    right:20px;
    color:white;
    background:rgba(0,0,0,.5);
    padding:10px 15px;
    border-radius:15px;
}

/* CONTROLS */
.controls{
    position:absolute;
    bottom:35px;
    left:25px;
    display:grid;
    grid-template-columns:75px 75px 75px;
    gap:12px;
    pointer-events:auto;
}

.btn{
    width:75px;
    height:75px;
    border:none;
    border-radius:22px;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(10px);
    color:white;
    font-size:28px;
    font-weight:bold;
    box-shadow:0 0 15px rgba(0,0,0,.6);
}

.up{
    grid-column:2;
}

.left{
    grid-column:1;
}

.down{
    grid-column:2;
}

.right{
    grid-column:3;
}

.fireBtn{
    position:absolute;
    bottom:55px;
    right:35px;
    width:95px;
    height:95px;
    border:none;
    border-radius:50%;
    background:#ff3131;
    color:white;
    font-size:34px;
    box-shadow:0 0 20px red;
    pointer-events:auto;
}

/* BULLET */
.bullet{
    position:absolute;
    width:18px;
    height:6px;
    background:yellow;
    border-radius:10px;
    z-index:4;
}

/* ENEMY */
.enemy{
    position:absolute;
    width:45px;
    height:65px;
    z-index:4;
}

.enemyHead{
    width:28px;
    height:28px;
    background:#ffb080;
    border-radius:50%;
    margin:auto;
}

.enemyBody{
    width:40px;
    height:37px;
    background:#ff2020;
    border-radius:8px;
    margin:auto;
}

/* MAP ITEMS */
.tree{
    position:absolute;
    font-size:45px;
}

.house{
    position:absolute;
    font-size:60px;
}

.safezone{
    position:absolute;
    width:260px;
    height:260px;
    border:4px dashed #00eaff;
    border-radius:50%;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    opacity:.8;
}

/* GAME OVER */
#gameOver{
    display:none;
    position:absolute;
    inset:0;
    z-index:50;
    background:rgba(0,0,0,.85);
    color:white;
    text-align:center;
    padding-top:220px;
}

#gameOver h1{
    color:red;
    font-size:42px;
}

#gameOver button{
    margin-top:25px;
    padding:15px 40px;
    border:none;
    border-radius:30px;
    background:#ffd000;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="game">

    <!-- LOBBY -->
    <div id="lobby">
        <h1>BATTLE ROYALE</h1>
        <p>Lobby • Character • Guns • Survival</p>

        <div class="character">
            <div class="head"></div>
            <div class="body"></div>
            <div class="legs">
                <div class="leg"></div>
                <div class="leg"></div>
            </div>
        </div>

        <button class="startBtn" onclick="startMatch()">START MATCH</button>
    </div>

    <!-- PLANE SCENE -->
    <div id="planeScene">
        <div id="plane">✈️</div>
        <button id="jumpBtn" onclick="jumpFromPlane()">JUMP</button>
    </div>

    <div id="parachute">🪂</div>

    <!-- SAFE ZONE -->
    <div class="safezone"></div>

    <!-- MAP OBJECTS -->
    <div class="tree" style="left:10%;top:25%;">🌲</div>
    <div class="tree" style="left:75%;top:30%;">🌴</div>
    <div class="tree" style="left:20%;top:70%;">🌳</div>
    <div class="house" style="left:60%;top:65%;">🏠</div>

    <!-- PLAYER -->
    <div id="player">
        <div class="pHead"></div>
        <div class="pBody"></div>
        <div class="pGun"></div>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div class="healthBox">
            <div id="health"></div>
        </div>

        <div class="inventory">
            🔫 Gun: Pistol<br>
            🎒 Bag: Level 1<br>
            ❤️ Medkit: 1
        </div>

        <div id="score">Kills: 0</div>

        <div class="controls">
            <button class="btn up" onclick="movePlayer(0,-25)">▲</button>
            <button class="btn left" onclick="movePlayer(-25,0)">◀</button>
            <button class="btn down" onclick="movePlayer(0,25)">▼</button>
            <button class="btn right" onclick="movePlayer(25,0)">▶</button>
        </div>

        <button class="fireBtn" onclick="shoot()">🔥</button>
    </div>

    <!-- GAME OVER -->
    <div id="gameOver">
        <h1>GAME OVER</h1>
        <p id="finalScore"></p>
        <button onclick="location.reload()">PLAY AGAIN</button>
    </div>

</div>

<script>
let player = document.getElementById("player");
let hud = document.getElementById("hud");
let healthBar = document.getElementById("health");
let scoreBox = document.getElementById("score");

let x = window.innerWidth / 2;
let y = window.innerHeight / 2;
let health = 100;
let kills = 0;
let gameStarted = false;

player.style.display = "none";

function startMatch(){
    document.getElementById("lobby").style.display = "none";
    document.getElementById("planeScene").style.display = "block";
}

function jumpFromPlane(){
    document.getElementById("planeScene").style.display = "none";
    document.getElementById("parachute").style.display = "block";

    setTimeout(()=>{
        document.getElementById("parachute").style.display = "none";
        player.style.display = "block";
        hud.style.display = "block";
        gameStarted = true;
        spawnEnemies();
        enemyAttack();
    },2500);
}

function movePlayer(dx,dy){
    if(!gameStarted) return;

    x += dx;
    y += dy;

    x = Math.max(20, Math.min(window.innerWidth - 60, x));
    y = Math.max(90, Math.min(window.innerHeight - 90, y));

    player.style.left = x + "px";
    player.style.top = y + "px";
}

function shoot(){
    if(!gameStarted) return;

    let bullet = document.createElement("div");
    bullet.className = "bullet";
    bullet.style.left = (x + 25) + "px";
    bullet.style.top = (y + 15) + "px";
    document.getElementById("game").appendChild(bullet);

    let bulletX = x + 25;

    let interval = setInterval(()=>{
        bulletX += 20;
        bullet.style.left = bulletX + "px";

        document.querySelectorAll(".enemy").forEach(enemy=>{
            let e = enemy.getBoundingClientRect();
            let b = bullet.getBoundingClientRect();

            if(
                b.left < e.right &&
                b.right > e.left &&
                b.top < e.bottom &&
                b.bottom > e.top
            ){
                enemy.remove();
                bullet.remove();
                clearInterval(interval);
                kills++;
                scoreBox.innerHTML = "Kills: " + kills;

                if(kills >= 5){
                    winGame();
                }
            }
        });

        if(bulletX > window.innerWidth){
            bullet.remove();
            clearInterval(interval);
        }
    },30);
}

function spawnEnemies(){
    for(let i=0;i<5;i++){
        let enemy = document.createElement("div");
        enemy.className = "enemy";
        enemy.style.left = Math.random() * (window.innerWidth - 80) + "px";
        enemy.style.top = (120 + Math.random() * (window.innerHeight - 220)) + "px";

        enemy.innerHTML = `
            <div class="enemyHead"></div>
            <div class="enemyBody"></div>
        `;

        document.getElementById("game").appendChild(enemy);
    }
}

function enemyAttack(){
    setInterval(()=>{
        if(!gameStarted) return;

        document.querySelectorAll(".enemy").forEach(enemy=>{
            let ex = enemy.offsetLeft;
            let ey = enemy.offsetTop;

            if(ex < x) ex += 5;
            if(ex > x) ex -= 5;
            if(ey < y) ey += 5;
            if(ey > y) ey -= 5;

            enemy.style.left = ex + "px";
            enemy.style.top = ey + "px";

            let distance = Math.hypot(ex - x, ey - y);

            if(distance < 50){
                health -= 5;
                healthBar.style.width = health + "%";

                if(health <= 0){
                    gameOver();
                }
            }
        });
    },700);
}

function gameOver(){
    gameStarted = false;
    document.getElementById("finalScore").innerHTML = "Your kills: " + kills;
    document.getElementById("gameOver").style.display = "block";
}

function winGame(){
    gameStarted = false;
    document.getElementById("gameOver").style.display = "block";
    document.querySelector("#gameOver h1").innerHTML = "BOOYAH!";
    document.querySelector("#gameOver h1").style.color = "#ffd000";
    document.getElementById("finalScore").innerHTML = "You defeated all enemies!";
}
</script>

</body>
                            </html>
